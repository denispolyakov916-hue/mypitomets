<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug экспорта CSV v2</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>
<body>
    <h1>Debug экспорта CSV</h1>
    <div>
        <button onclick="checkAuth()">Проверить авторизацию</button>
        <button onclick="testSimpleAdmin()">Тест простого admin API</button>
        <button onclick="testExport()">Тест экспорта</button>
        <button onclick="testDirectURL()">Прямой тест URL</button>
        <button onclick="checkAdminRights()">Проверить права админа</button>
    </div>
    <div id="output"></div>

    <script>
        const output = document.getElementById('output');

        function log(message) {
            output.innerHTML += '<p>' + new Date().toLocaleTimeString() + ': ' + message + '</p>';
            console.log(message);
        }

        async function testSimpleAdmin() {
            try {
                log('Testing simple admin endpoint...');
                const token = localStorage.getItem('access_token');

                const response = await axios.get('/api/admin/stats/summary/', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                log('Simple admin test SUCCESS: ' + response.status);
                log('Response: ' + JSON.stringify(response.data));
            } catch (error) {
                log('Simple admin test FAILED: ' + error.message + ' (status: ' + (error.response?.status || 'unknown') + ')');
            }
        }

        async function checkAuth() {
            try {
                const token = localStorage.getItem('access_token');
                log('Token exists: ' + !!token);
                log('Token length: ' + (token ? token.length : 0));

                if (token) {
                    const response = await axios.get('/api/users/profile/', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    log('Auth check success: ' + JSON.stringify(response.data));

                    // Проверим права админа
                    try {
                        const adminResponse = await axios.get('/api/admin/stats/summary/', {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        log('Admin rights check: SUCCESS');
                    } catch (adminError) {
                        log('Admin rights check: FAILED - ' + adminError.message + ' (status: ' + (adminError.response?.status || 'unknown') + ')');
                    }
                }
            } catch (error) {
                log('Auth check failed: ' + error.message);
            }
        }

        async function testExport() {
            try {
                const token = localStorage.getItem('access_token');
                log('Starting export test with token: ' + !!token);

                const params = {
                    model: 'users',
                    format: 'csv',
                    filters: '{}',
                    filename: 'test_export_' + new Date().toISOString().split('T')[0]
                };

                log('Export params: ' + JSON.stringify(params));

                // Попробуем POST запрос вместо GET с параметрами в теле
                const response = await axios.post('/api/admin/management/export_data/', params, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    responseType: 'blob'
                });

                log('Export response status: ' + response.status);
                log('Export response headers: ' + JSON.stringify(response.headers));

                if (response.data) {
                    log('Response data size: ' + response.data.size + ' bytes');

                    const blob = new Blob([response.data], { type: 'text/csv' });
                    const url = window.URL.createObjectURL(blob);

                    const link = document.createElement('a');
                    link.href = url;
                    link.download = params.filename + '.csv';

                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                    window.URL.revokeObjectURL(url);

                    log('File download initiated');
                }

            } catch (error) {
                log('Export test failed: ' + error.message);
                if (error.response) {
                    log('Response status: ' + error.response.status);
                    log('Response data: ' + JSON.stringify(error.response.data));
                }
            }
        }

        async function testDirectURL() {
            try {
                log('Testing direct URL access with POST...');
                const response = await axios.post('/api/admin/management/export_data/', {
                    model: 'users',
                    format: 'csv',
                    filters: '{}'
                }, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('access_token')}`,
                        'Content-Type': 'application/json'
                    }
                });
                log('Direct URL test success: ' + response.status);
            } catch (error) {
                log('Direct URL test failed: ' + error.message + ' (status: ' + (error.response?.status || 'unknown') + ')');
            }
        }

        async function checkAdminRights() {
            try {
                log('Checking admin rights...');
                const token = localStorage.getItem('access_token');

                // Попробуем вызвать admin-only endpoint
                const response = await axios.post('/api/admin/management/export_data/', {
                    model: 'users',
                    format: 'csv',
                    filters: '{}'
                }, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    timeout: 5000
                });
                log('Admin rights confirmed: endpoint accessible');
            } catch (error) {
                if (error.response?.status === 403) {
                    log('Admin rights check: FAILED - user is not admin (403 Forbidden)');
                } else if (error.response?.status === 401) {
                    log('Admin rights check: FAILED - user not authenticated (401 Unauthorized)');
                } else if (error.response?.status === 404) {
                    log('Admin rights check: FAILED - endpoint not found (404 Not Found)');
                } else {
                    log('Admin rights check: FAILED - ' + error.message + ' (status: ' + (error.response?.status || 'unknown') + ')');
                }
            }
        }
    </script>
</body>
</html>
