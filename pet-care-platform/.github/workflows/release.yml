name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ steps.get_version.outputs.VERSION }}
        body: |
          ## 🚀 Release ${{ steps.get_version.outputs.VERSION }}

          ### Изменения в этой версии:
          <!-- Генерируется автоматически из коммитов -->

          ### Backend
          - [Backend changes will be listed here]

          ### Frontend
          - [Frontend changes will be listed here]

          ### Инфраструктура
          - [Infrastructure changes will be listed here]

          ---
          **Полный changelog:** [Compare releases](https://github.com/${{ github.repository }}/compare/v${{ steps.get_version.outputs.VERSION }}...main)
        draft: false
        prerelease: false

  # Deploy to staging (опционально)
  deploy-staging:
    runs-on: ubuntu-latest
    if: contains(github.ref, 'beta') || contains(github.ref, 'rc')
    needs: release

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to staging
      run: |
        echo "Deploying to staging environment..."
        # Здесь будут команды для деплоя на staging

  # Deploy to production (только для stable релизов)
  deploy-production:
    runs-on: ubuntu-latest
    if: "!contains(github.ref, 'beta') && !contains(github.ref, 'rc') && !contains(github.ref, 'alpha')"
    needs: release
    environment: production

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to production
      run: |
        echo "Deploying to production environment..."
        # Здесь будут команды для деплоя на production
