# =============================================================================
# GitHub Actions: CI/CD для Питомец+
#
# Триггеры:
#   - Push в main → тесты + деплой на production
#   - Pull Request → только тесты
#
# Секреты (настроить в Settings → Secrets and variables → Actions):
#   SERVER_HOST     — IP или домен production сервера
#   SERVER_USER     — пользователь SSH (deploy)
#   SSH_PRIVATE_KEY — приватный SSH ключ для подключения к серверу
#   PROJECT_PATH    — путь к проекту на сервере (/opt/petplus)
# =============================================================================

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ===========================================================================
  # Тесты backend
  # ===========================================================================
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: pitomets_test
          POSTGRES_USER: pitomets
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pitomets"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Установка зависимостей
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Тесты Django
        working-directory: backend
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DEBUG: 'True'
          DB_NAME: pitomets_test
          DB_USER: pitomets
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: 5432
        run: python manage.py test --verbosity=2 --parallel

      - name: Стресс-тест подбора корма
        working-directory: backend
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DEBUG: 'True'
          DB_NAME: pitomets_test
          DB_USER: pitomets
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: 5432
        run: python manage.py test apps.pets.tests.stress_test_food --verbosity=2

  # ===========================================================================
  # Сборка frontend
  # ===========================================================================
  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Установка зависимостей
        working-directory: frontend
        run: npm ci

      - name: Сборка production
        working-directory: frontend
        run: npm run build

      - name: Тесты
        working-directory: frontend
        run: npm run test:run || true

  # ===========================================================================
  # Деплой на production
  # ===========================================================================
  deploy:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Деплой через SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.PROJECT_PATH || '/opt/petplus' }}
            bash scripts/deploy.sh 2>&1 | tail -50
