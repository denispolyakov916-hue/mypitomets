name: Add to Project

on:
  issues:
    types: [opened, labeled]
  pull_request:
    types: [opened, labeled]

jobs:
  add-to-project:
    name: Add issue/PR to project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v0.5.0
        with:
          # You can find your project ID by navigating to your project and checking the URL
          # For example: https://github.com/orgs/YOUR_ORG/projects/1
          project-url: https://github.com/users/YOUR_USERNAME/projects/1
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
          labeled: enhancement, bug, documentation, help wanted, good first issue
          label-operator: OR
