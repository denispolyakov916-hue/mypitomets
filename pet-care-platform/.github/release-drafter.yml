name-template: 'v$RESOLVED_VERSION 🌈'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels:
      - feature
      - enhancement
  - title: '🐛 Bug Fixes'
    labels:
      - fix
      - bugfix
      - bug
  - title: '🧹 Maintenance'
    labels:
      - chore
      - maintenance
  - title: '📚 Documentation'
    labels:
      - documentation
      - docs
  - title: '🔧 Configuration'
    labels:
      - config
      - configuration
  - title: '🎨 Styling'
    labels:
      - styling
      - style
  - title: '🧪 Testing'
    labels:
      - testing
      - test
      - tests
  - title: '⚡ Performance'
    labels:
      - performance
      - perf
  - title: '🔒 Security'
    labels:
      - security
      - sec
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&' # You can add # and @ to disable mentions, and add ` to disable code blocks.
version-resolver:
  major:
    labels:
      - major
      - breaking
  minor:
    labels:
      - minor
      - feature
      - enhancement
  patch:
    labels:
      - patch
      - fix
      - bugfix
      - bug
      - maintenance
      - chore
      - documentation
      - config
      - styling
      - testing
      - performance
      - security
  default: patch
template: |
  ## Changes

  $CHANGES

  ## Contributors

  $CONTRIBUTORS
