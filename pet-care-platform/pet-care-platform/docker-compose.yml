# =============================================================================
# Docker Compose — Production
# Питомец+ (pet-care-platform)
# =============================================================================
#
# Запуск:       docker compose up -d --build
# Миграции:     docker compose exec backend python manage.py migrate
# Логи:         docker compose logs -f
# Остановка:    docker compose down
# С удалением:  docker compose down -v  (ВНИМАНИЕ: удалит данные БД!)

services:
  # ===========================================================================
  # PostgreSQL
  # ===========================================================================
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-pitomets_db}
      POSTGRES_USER: ${DB_USER:-pitomets}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Укажите DB_PASSWORD в .env}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=ru_RU.UTF-8"
      LANG: ru_RU.UTF-8
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pitomets} -d ${DB_NAME:-pitomets_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================================================
  # Django Backend (Gunicorn)
  # ===========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8077"

  # ===========================================================================
  # Nginx (reverse proxy + frontend)
  # ===========================================================================
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - backend_static:/app/staticfiles:ro
      - backend_media:/app/media:ro
      # Beta-prod: файл паролей Basic Auth (создаётся на сервере, в git не коммитится)
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      # Раскомментировать при подключении SSL (Let's Encrypt / certbot):
      # - ./certbot/conf:/etc/letsencrypt:ro
      # - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend

  # ===========================================================================
  # Redis (кэширование) — опционально
  # ===========================================================================
  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
  #   volumes:
  #     - redis_data:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # ===========================================================================
  # Certbot (SSL) — раскомментировать при подключении домена
  # ===========================================================================
  # certbot:
  #   image: certbot/certbot
  #   volumes:
  #     - ./certbot/conf:/etc/letsencrypt
  #     - ./certbot/www:/var/www/certbot
  #   entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

volumes:
  pgdata:
  backend_static:
  backend_media:
  backend_logs:
  # redis_data:
