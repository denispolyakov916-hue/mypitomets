upstream backend {
    server backend:8077;
}

# HTTP: оставляем ACME challenge открытым, всё остальное переводим на HTTPS
server {
    listen 80;
    server_name betapitometsplus.ru www.betapitometsplus.ru;

    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    location ^~ /.well-known/acme-challenge/ {
        auth_basic off;
        root /var/www/certbot;
    }

    location = /robots.txt {
        auth_basic off;
        default_type text/plain;
        return 200 "User-agent: *
Disallow: /
";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: основной сайт
server {
    listen 443 ssl http2;
    server_name betapitometsplus.ru www.betapitometsplus.ru;

    ssl_certificate /etc/letsencrypt/live/betapitometsplus.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/betapitometsplus.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Безопасность
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    # ACME-challenge для продления SSL — без пароля
    location ^~ /.well-known/acme-challenge/ {
        auth_basic off;
        root /var/www/certbot;
    }

    # robots.txt — без пароля
    location = /robots.txt {
        auth_basic off;
        default_type text/plain;
        return 200 "User-agent: *
Disallow: /
";
    }

    # API
    location /api/auth/ {
        # API защищён JWT; снимаем human Basic-Auth gate — иначе Safari/WebKit не
        # прикрепляет cached Basic-креды к XHR → 401 + нативное окно пароля и «краш».
        auth_basic off;
        limit_req zone=auth burst=10 nodelay;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        auth_basic off;  # JWT-защита; Basic-gate только для SPA (см. /api/auth/ выше)
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 100m;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django static files
    # ^~ — чтобы префикс выигрывал у regex-блока ниже (иначе /static/*.css,*.js
    # перехватывались бы им и отдавались из фронт-сборки → 404, включая CSS админки).
    location ^~ /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files (загруженные фото питомцев и т.п.)
    # ^~ обязательно: иначе /media/*.jpg перехватывал regex-блок и фото не отдавались.
    location ^~ /media/ {
        auth_basic off;
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Frontend assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Frontend React SPA
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
