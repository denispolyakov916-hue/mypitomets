upstream backend {
    server backend:8077;
}

server {
    listen 80;
    server_name betapitometsplus.ru www.betapitometsplus.ru;

    # Безопасность
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # =========================================================================
    # Beta-prod: закрытый доступ (Basic Auth) + запрет индексации.
    # auth_basic наследуется во все location, кроме тех, где явно 'auth_basic off'.
    # =========================================================================
    auth_basic "Private Beta";
    auth_basic_user_file /etc/nginx/.htpasswd;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    # ACME-challenge для выпуска SSL — без пароля
    location ^~ /.well-known/acme-challenge/ {
        auth_basic off;
        root /var/www/certbot;
    }

    # robots.txt — без пароля, запрет индексации для всех краулеров
    location = /robots.txt {
        auth_basic off;
        default_type text/plain;
        return 200 "User-agent: *
Disallow: /
";
    }

    # =========================================================================
    # API — проксирование на Django backend
    # =========================================================================
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Для загрузки файлов
        client_max_body_size 100m;
    }

    # Rate limit для аутентификации
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================================================================
    # Django Admin
    # =========================================================================
    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================================================================
    # Django static files (collectstatic)
    # =========================================================================
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # =========================================================================
    # Media files (локальное хранилище — fallback, если S3 не настроен)
    # =========================================================================
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # =========================================================================
    # Frontend — React SPA
    # =========================================================================
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Кэширование статики фронтенда (Vite добавляет hash в имена файлов)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # =========================================================================
    # Certbot (для SSL — раскомментировать при подключении домена)
    # =========================================================================
    # location /.well-known/acme-challenge/ {
    #     root /var/www/certbot;
    # }
}

