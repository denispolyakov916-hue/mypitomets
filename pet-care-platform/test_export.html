<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест экспорта CSV</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>
<body>
    <h1>Тест экспорта CSV</h1>
    <button onclick="testExport()">Экспортировать пользователей в CSV</button>

    <script>
        async function testExport() {
            try {
                // Имитируем параметры экспорта
                const exportParams = {
                    format: 'csv',
                    model: 'users',
                    filters: JSON.stringify({}),
                    filename: 'users_export_2024-01-04'
                };

                console.log('Testing export with params:', exportParams);

                // Имитируем API вызов (в реальности это делается через adminAPI)
                const token = localStorage.getItem('access_token') || 'test_token';

                const response = await axios.get('http://localhost:8000/api/admin/management/export_data/', {
                    params: {
                        model: exportParams.model,
                        format: exportParams.format,
                        filters: exportParams.filters,
                        filename: exportParams.filename
                    },
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    responseType: 'blob'
                });

                console.log('Response received:', response);

                // Создаем blob и скачиваем
                const blob = new Blob([response.data], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);

                const link = document.createElement('a');
                link.href = url;
                link.download = exportParams.filename + '.csv';

                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                window.URL.revokeObjectURL(url);

                alert('Экспорт завершен! Проверьте загруженный файл.');
            } catch (error) {
                console.error('Export error:', error);
                alert('Ошибка экспорта: ' + (error.response?.data?.error || error.message));
            }
        }
    </script>
</body>
</html>
